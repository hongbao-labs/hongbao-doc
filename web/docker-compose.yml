services:
  dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development

  web:
    build:
      context: .
      target: production
    ports:
      - "8080:80"
    profiles:
      - production

volumes:
  node_modules:
